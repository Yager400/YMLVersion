<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plugin Developer Documentation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0f1c;
  --sidebar: #0f172a;
  --sidebar-hover: #1e293b;
  --border: #1f2937;
  --text: #e5e7eb;
  --muted: #94a3b8;
  --accent: #f97316;
  --accent-soft: rgba(34,197,94,0.1);
  --code-bg: #0f172a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  display: flex;
  height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "Inter", sans-serif;
}


aside {
  width: 290px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  padding: 2rem 1.2rem;
  overflow-y: auto;
  transition: 0.3s ease;
}

.logo {
  font-weight: 700;
  font-size: 1.25rem;
  margin-bottom: 2rem;
  color: var(--accent);
  letter-spacing: 0.5px;
}

details { margin-bottom: 0.8rem; }

summary {
  cursor: pointer;
  padding: 0.5rem 0.6rem;
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  transition: 0.2s ease;
}

summary:hover {
  background: var(--sidebar-hover);
}

details a {
  display: block;
  padding: 0.45rem 1.5rem;
  font-size: 0.85rem;
  text-decoration: none;
  color: var(--muted);
  border-radius: 6px;
  transition: 0.2s ease;
}

details a:hover {
  color: var(--accent);
  background: var(--accent-soft);
}

details a.active {
  color: var(--accent);
  background: var(--accent-soft);
}

/* ========== MAIN ========== */

main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

/* Topbar */
.topbar {
  height: 60px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 2rem;
  font-size: 0.9rem;
  color: var(--muted);
  background: rgba(15,23,42,0.7);
  backdrop-filter: blur(10px);
}

.content {
  padding: 3rem;
  max-width: 950px;
}

/* Headings */

h1 {
  font-size: 2.4rem;
  font-weight: 700;
  margin-bottom: 1.5rem;
}

h2 {
  margin-top: 3rem;
  margin-bottom: 1rem;
  font-size: 1.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
}

h3 {
  margin-top: 2rem;
  margin-bottom: 0.6rem;
  font-size: 1.15rem;
}

p {
  line-height: 1.8;
  margin-bottom: 1.2rem;
  color: var(--muted);
}

a {
  color: var(--accent);
  text-decoration: none;
}

a:hover { text-decoration: underline; }

/* Code */

pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  padding: 1.2rem;
  border-radius: 10px;
  overflow-x: auto;
  margin: 1.5rem 0;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02);
}

code {
  font-family: "JetBrains Mono", monospace;
  font-size: 0.85rem;
}

/* Blockquote */

blockquote {
  border-left: 4px solid var(--accent);
  padding-left: 1rem;
  margin: 1.5rem 0;
  color: var(--muted);
}

/* TOC */

#toc {
  background: #0f172a;
  border: 1px solid var(--border);
  padding: 1.2rem;
  border-radius: 10px;
  margin-bottom: 2rem;
}

#toc h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 0.8rem;
}

#toc a {
  display: block;
  font-size: 0.85rem;
  margin: 0.4rem 0;
  color: var(--muted);
  transition: 0.2s ease;
}

#toc a:hover {
  color: var(--accent);
}

/* Scrollbar */

::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-thumb {
  background: #1e293b;
  border-radius: 4px;
}
</style>
</head>

<body>

<aside>
  <div class="logo">YMLVersion docs</div>

  <details open>
    <summary>Getting Started</summary>
    <a href="#" onclick="navigate(this,'/doc/getting-started/introduction.md')">Introduction</a>
    <a href="#" onclick="navigate(this,'/doc/getting-started/installation.md')">Installation</a>
  </details>

  <details>
    <summary>API Reference</summary>
    <a href="#" onclick="navigate(this,'/doc/API/api.md')">API</a>
    <a href="#" onclick="navigate(this,'/doc/API/examples.md')">Examples</a>
  </details>
</aside>

<main>
  <div class="topbar">
    YMLVersion Developer Documentation
  </div>
  <div class="content" id="content"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const repoBaseUrl = "https://raw.githubusercontent.com/Yager400/YMLVersion/refs/heads/main/docs";

function setActive(element) {
  document.querySelectorAll("aside a").forEach(a => a.classList.remove("active"));
  element.classList.add("active");
}

async function navigate(element, file) {
  setActive(element);
  await loadMarkdown(file);
}

async function loadMarkdown(file) {
  try {
    const res = await fetch(repoBaseUrl + file);
    if (!res.ok) throw new Error();
    const md = await res.text();
    const html = marked.parse(md);
    document.getElementById("content").innerHTML = generateTOC(html);
  } catch {
    document.getElementById("content").innerHTML =
      "<p style='color:red;'>Failed to load documentation file.</p>";
  }
}

function generateTOC(html) {
  const temp = document.createElement("div");
  temp.innerHTML = html;

  const headings = temp.querySelectorAll("h2, h3");
  let toc = "";

  headings.forEach(h => {
    const id = h.textContent.replace(/\s+/g, "-").toLowerCase();
    h.id = id;
    toc += `<a href="#${id}">${h.textContent}</a>`;
  });

  toc += "";
  return toc + temp.innerHTML;
}

loadMarkdown("/README.md");
</script>

</body>
</html>
